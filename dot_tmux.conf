# https://raw.github.com/seebi/tmux-colors-solarized/master/tmuxcolors.conf

#### COLOUR

# default statusbar colors
set-option -g status-style bg=colour235,fg=colour136,default

# default window title colors
set-window-option -g window-status-style fg=colour244,bg=default,dim

# active window title colors
set-window-option -g window-status-current-style fg=colour166,bg=default,bright

# pane border
set-option -g pane-border-style fg=colour235
set-option -g pane-active-border-style fg=colour240

# message text
set-option -g message-style bg=colour235,fg=colour166

# pane number display
set-option -g pane-active-border-style fg=colour33
set-option -g pane-border-style fg=colour166

# clock
set-window-option -g clock-mode-colour colour64 #green

set -g status-right "#{host} %Y-%m-%d %H:%M #{online_status}"

# act like vim
setw -g mode-keys vi
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R
bind-key -r C-h select-window -t :-
bind-key -r C-l select-window -t :+

# Use C-b as the real prefix. Raw C-a behaves like the prefix, except in mosh
# panes where it passes through to a remote tmux session.
set-option -g prefix C-b
bind-key -n C-a if -F '#{==:#{pane_current_command},mosh-client}' 'send-keys C-a' 'switch-client -T prefix'

# first window is one
set -g base-index 1
set -g pane-base-index 1
set-option -g base-index 1
set-window-option -g pane-base-index 1

# sort sessions by name
bind s choose-tree -s -O name

# Russian layout aliases for prefix commands. XKB's grp:ctrl_select fixes the
# Ctrl prefix itself, but the next tmux key is unmodified and arrives as a
# Cyrillic keysym when the Russian layout is active.
bind ы choose-tree -s -O name
bind ц choose-tree -Zw
bind с new-window
bind в detach-client
bind т next-window
bind з previous-window
bind р select-pane -L
bind о select-pane -D
bind л select-pane -U
bind д select-pane -R
bind ч confirm-before -p "kill-pane #P? (y/n)" kill-pane
bind я resize-pane -Z

# look good
# set -g default-terminal "screen-256color"
# set term=screen-256color
# set -ga terminal-overrides ",xterm-256color:Tc"
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",*256col*:Tc"
set -g update-environment "DISPLAY KRB5CCNAME SSH_ASKPASS SSH_AUTH_SOCK SSH_AGENT_PID SSH_CONNECTION WINDOWID XAUTHORITY COLORTERM MOSH_CONNECTION"

set -sg escape-time 10

# Set window notifications
setw -g monitor-activity on
set -g visual-activity off

# Automatically set window title
# setw -g automatic-rename

# My bindings
bind-key C-a last-window
unbind %
bind | split-window -h
bind - split-window -v

bind [ copy-mode
bind Escape copy-mode
bind -Tcopy-mode-vi v send -X begin-selection
bind -Tcopy-mode-vi y send -X copy-pipe 'xclip -in -selection clipboard' \; display-message "copied to system clipboard"
bind -Tcopy-mode-vi C-v send -X rectangle-toggle
bind ] paste-buffer

set -g @plugin 'tmux-plugins/tpm'
# set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'tmux-plugins/tmux-online-status'

# Initialize TMUX plugin manager when installed.
if-shell -b 'test -x ~/.tmux/plugins/tpm/tpm' 'run-shell ~/.tmux/plugins/tpm/tpm'

set-option -g default-command "exec zsh -l"
