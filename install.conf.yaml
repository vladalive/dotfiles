- clean: ['~']

- link:
    ~/.dotfiles: ''
    ~/.gitconfig: 'files/gitconfig'
    ~/.gitignore: 'files/gitignore'
    ~/.bash_profile: 'files/bash_profile'
    ~/.bash_aliases: 'files/bash_aliases'
    ~/.zshrc: 'files/zshrc'
    ~/.bashrc: 'files/bashrc'
    ~/.gemrc: 'files/gemrc'
    ~/.vimrc.after: 'files/vimrc.local'
    ~/.tmux.conf: 'files/tmux.conf'
    ~/.janus: 'files/janus'
    ~/.default-gems: 'files/default-gems'
    ~/.asdfrc: 'files/asdfrc'
    ~/.ctags: 'files/ctags'
    ~/.ctags.d/default.ctags:
      path: 'files/ctags'
      create: true
    ~/.rubocop.yml: 'files/rubocop.yml'
    ~/.config/nvim/init.lua:
      path: 'files/nvim-init.lua'
      create: true
    ~/.config/nvim/.stylua.toml:
      path: 'files/nvim-stylua.toml'
      create: true
    ~/.config/nvim/selene.toml:
      path: 'files/nvim-selene.toml'
      create: true
    ~/.config/nvim/nvim.yml:
      path: 'files/nvim.yml'
      create: true
    ~/.config/nvim/lua/custom/my:
      path: 'files/nvim_custom_plugins'
      create: true
    ~/.config/mise/config.toml:
      path: 'files/mise.toml'
      create: true

- shell:
  - [git submodule update --init --recursive, Installing submodules]
